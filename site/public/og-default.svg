<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1A1614" stroke-width="0.4" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#F7F3EC"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="60" y="60" width="1080" height="510" fill="none" stroke="#1A1614" stroke-width="1.2"/>
  <rect x="68" y="68" width="1064" height="494" fill="none" stroke="#B8863D" stroke-width="0.6"/>

  <!-- Masthead -->
  <text x="600" y="145" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="20" letter-spacing="8" font-weight="500" fill="#B8863D">EDITION N°1 · AVRIL 2026</text>
  <line x1="130" y1="175" x2="1070" y2="175" stroke="#1A1614" stroke-width="0.8"/>

  <!-- Titre -->
  <text x="600" y="300" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="92" font-weight="500" fill="#1A1614" letter-spacing="-3">L'Observatoire</text>
  <text x="600" y="385" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="62" font-style="italic" font-weight="400" fill="#1E3A52" letter-spacing="-1.5">des Pros</text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="22" font-style="italic" fill="#3D342E">« Observer. Vérifier. Recommander. »</text>

  <!-- Sceau miniature -->
  <g transform="translate(600 540)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#B8863D" stroke-width="1"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#B8863D" stroke-width="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="18" font-style="italic" fill="#B8863D">OdP</text>
  </g>

  <!-- Folio -->
  <line x1="130" y1="580" x2="1070" y2="580" stroke="#1A1614" stroke-width="0.6"/>
  <text x="135" y="605" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1" fill="#7A6E63">LOBSERVATOIREDESPROS.COM</text>
  <text x="1065" y="605" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1" fill="#7A6E63">LE GUIDE DES PROS FRANCAIS</text>
</svg>

name: Deploy Edge Functions to Cloudflare Pages

# Fast lane for site/functions/ changes only.
# Reuses the dist artifact from the latest deploy-site.yml run, attaches the
# new functions/, and redeploys in roughly 30 seconds. No Astro rebuild.

on:
  push:
    branches: [main]
    paths:
      - "site/functions/**"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write
  actions: read

concurrency:
  group: deploy-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest dist artifact from deploy-site
        id: get-dist
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: deploy-site.yml
          name: dist-latest
          path: site/dist
          if_no_artifact_found: warn
          workflow_conclusion: success
          branch: main

      - name: Trigger full rebuild if no dist artifact
        if: steps.get-dist.outputs.found_artifact == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-site.yml',
              ref: 'main'
            });
            core.setFailed('No dist artifact found, triggered full rebuild via deploy-site.yml');

      - name: Copy functions into dist (CF Pages bundles them on deploy)
        if: steps.get-dist.outputs.found_artifact == 'true'
        run: |
          ls -la site/dist | head -10
          echo "Functions to deploy:"
          find site/functions -type f | head -20

      - name: Deploy to Cloudflare Pages (functions+dist)
        if: steps.get-dist.outputs.found_artifact == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=lobservatoiredespros --branch=main

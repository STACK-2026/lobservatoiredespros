name: Deploy site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Daily rebuild guard"]
    types: [completed]

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build

      - name: Upload dist artifact (consumed by deploy-functions fast-lane)
        # Non-blocking: artifact quota may be temporarily exceeded; deploy itself
        # succeeds and fast-lane falls back to previous artifact if needed.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: dist-latest
          path: site/dist
          retention-days: 1
          if-no-files-found: error
          overwrite: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=lobservatoiredespros --branch=main

      - name: Purge CF cache for SEO-critical files
        # Activates once CF_PURGE_TOKEN secret is set (Phase 3 of deploy hardening).
        # Until then this step gracefully no-ops -- safe to merge.
        if: success()
        env:
          CF_PURGE_TOKEN: ${{ secrets.CF_PURGE_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          SITE_URL: https://lobservatoiredespros.com
        run: |
          if [ -z "$CF_PURGE_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "CF_PURGE_TOKEN or CF_ZONE_ID missing, skip (Phase 3 not yet wired)"; exit 0;
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_PURGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"files\":[\"$SITE_URL/robots.txt\",\"$SITE_URL/sitemap.xml\",\"$SITE_URL/sitemap-index.xml\",\"$SITE_URL/llms.txt\",\"$SITE_URL/llms-full.txt\",\"$SITE_URL/ai-sitemap.xml\"]}" || true

      - name: Ping IndexNow
        if: success()
        env:
          SITE_URL: https://lobservatoiredespros.com
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python3 scripts/indexnow_ping.py || true

name: Daily rebuild guard

on:
  schedule:
    # Chaque jour a 06:12 UTC (07:12 Paris hiver / 08:12 ete)
    - cron: "12 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    name: Update build marker
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push rebuild marker
        run: |
          git config user.name "observatoire-bot"
          git config user.email "bot@lobservatoiredespros.com"
          # Reset-then-recreate pattern: never conflict on concurrent timestamp writes.
          # Always re-anchors to origin/main on a real branch so push from detached HEAD impossible.
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git fetch origin
            git checkout -B main origin/main
            mkdir -p site/public
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > site/public/.build-marker
            git add site/public/.build-marker
            if git diff --cached --quiet; then echo "no changes" && exit 0; fi
            git commit -m "chore: daily rebuild marker $(date -u +%Y-%m-%d)"
            if git push origin main; then exit 0; fi
            echo "push attempt $i failed, retrying..."
            sleep $((2 + RANDOM % 6))
          done
          echo "push failed after 5 attempts" >&2
          exit 1

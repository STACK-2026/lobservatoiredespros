name: Auto-publish preavis expires
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Auto-publish expired preavis (>48h)
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $SUPABASE_PAT" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/apuyeakgxjgdcfssrtek/database/query" \
            -d '{"query": "UPDATE public.pro_avis SET status = '\''publie'\'', published_at = now() WHERE status = '\''en_attente_preavis_artisan'\'' AND preavis_envoye_at < (now() - interval '\''48 hours'\'') RETURNING id;"}')
          echo "Result: $RESPONSE"
          COUNT=$(echo "$RESPONSE" | python3 -c "import sys, json; d = json.load(sys.stdin); print(len(d) if isinstance(d, list) else 0)")
          echo "Avis publies automatiquement : $COUNT"
